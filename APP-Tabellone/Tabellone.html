<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Torneo Biliardino - LAINATE</title>

<style>
:root{
  --primary:#6E0F4B;
  --accent1:#3189A1;
  --accent2:#00B446;

  --bye:#FF9800;        /* ripescaggio */
  --win:#00B446;        /* vittoria */

  --line: rgba(255,255,255,.85);
  --panel: rgba(255,255,255,.14);
  --text: #ffffff;
}

*{ box-sizing:border-box; font-family: Arial, Helvetica, sans-serif; }
html,body{ height:100%; }

body{
  margin:0;
  color:var(--text);
  background: var(--primary);
  overflow:hidden; /* TV 55" */
}

/* Sfondo: immagine più opaca + overlay forte per leggibilità */
.bg{
  position:fixed; inset:0;
  background: url("kion-bg.png") center/cover no-repeat;
  opacity:.14;                 /* <- più opaco */
  pointer-events:none;
}
.overlay{
  position:fixed; inset:0;
  background: rgba(110,15,75,.80); /* <- overlay più “coprente” */
  pointer-events:none;
}

.app{
  position:relative;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* HEADER: logo a sinistra, titolo centrato */
header{
  position:relative;
  padding:12px 16px 6px;
  min-height:72px;
}
header .logo{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  height:52px;
  width:auto;
}
header .titles{
  text-align:center;
  line-height:1.05;
}
header h1{
  margin:0;
  font-size: clamp(26px, 2.2vw, 44px);
  font-weight:800;
  letter-spacing:.2px;
}
header h2{
  margin:4px 0 0;
  font-size: clamp(14px, 1.2vw, 22px);
  font-weight:400;
  opacity:.95;
}

/* CONTROLLI */
.controls{
  text-align:center;
  padding:6px 16px 0;
}
.controls .card{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border-radius:10px;
  background: rgba(0,0,0,.18);
  backdrop-filter: blur(2px);
}
.controls label{ font-size:16px; opacity:.95; }
.controls input{
  padding:8px 10px;
  font-size:16px;
  width:110px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  color:#fff;
  outline:none;
}
.controls button{
  padding:9px 14px;
  font-size:16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background: #fff;
  color: var(--primary);
  font-weight:800;
}
.controls button:hover{ opacity:.92; }

/* LAYOUT TABELLONE */
.bracket{
  flex:1;
  display:flex;
  justify-content:space-between;
  padding:10px 14px 14px;
  gap:12px;
  min-height:0;
}

.girone{
  width:43%;
  position:relative;
  display:flex;
  gap:10px;
  min-height:0;
}

.girone.reverse{ flex-direction: row-reverse; }

.round{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  gap:16px;
  min-width:0;
  position:relative;
  z-index:2; /* sopra linee */
}

.match{
  background: var(--panel);
  border-radius:10px;
  padding:8px 8px 7px;
  box-shadow: 0 4px 14px rgba(0,0,0,.16);
}

.team{
  display:flex;
  align-items:center;
  gap:6px;
  margin:4px 0;
}

/* Nome squadra max 15 */
.team input.name{
  flex:1;
  min-width:0;
  padding:6px 8px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  color:#fff;
  outline:none;
  font-size:14px;
}
.team input.name::placeholder{ color: rgba(255,255,255,.7); }

/* Score 2 cifre numeriche */
.team input.score{
  width:44px;
  padding:6px 6px;
  text-align:center;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  color:#fff;
  outline:none;
  font-size:14px;
}

/* Indicatore vittoria: circolare toggle */
.dot{
  width:16px;
  height:16px;
  border-radius:50%;
  cursor:pointer;
  border:1px solid rgba(255,255,255,.35);
  opacity:.28;
  box-shadow:none;
  flex:0 0 auto;
}

.dot.win{ background: var(--win); }
.dot.bye{ background: var(--bye); }

.dot.active{
  opacity:1;
}
.dot.win.active{
  box-shadow: 0 0 0 3px rgba(0,180,70,.25), 0 0 10px rgba(0,180,70,.85);
}
.dot.bye.active{
  box-shadow: 0 0 0 3px rgba(255,152,0,.25), 0 0 10px rgba(255,152,0,.85);
}

/* Tempo */
.time input{
  width:100%;
  margin-top:6px;
  padding:6px 8px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  color:#fff;
  outline:none;
  font-size:12px;
}
.time input::placeholder{ color: rgba(255,255,255,.7); }

/* CENTRO / FINALE - ridotta */
.center{
  width:14%;                 /* <- più stretta */
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:8px;
  min-width: 180px;          /* evita troppo stretto */
}
.trophy{ font-size:62px; }   /* <- un po’ più piccola */
.final{
  width:100%;
  background: rgba(0,0,0,.18);
  border-radius:12px;
  padding:8px;               /* <- ridotto */
}
.final input{
  width:100%;
  padding:7px 9px;           /* <- ridotto */
  margin:5px 0;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.25);
  background: rgba(255,255,255,.10);
  color:#fff;
  outline:none;
  font-size:13px;
}
.final input::placeholder{ color: rgba(255,255,255,.7); }

/* SVG linee */
svg.lines{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:1;
  pointer-events:none;
}

/* Ottimizzazione per schermi grandi */
@media (min-width: 1900px){
  .team input.name{ font-size:16px; }
  .team input.score{ font-size:16px; }
  .controls label, .controls button, .controls input { font-size:18px; }
  header .logo{ height:58px; }
  .center{ min-width: 210px; }
}
</style>
</head>

<body>
  <div class="bg"></div>
  <div class="overlay"></div>

  <div class="app">
    <header>
      <img class="logo" src="kion-logo.png" alt="KION" />
      <div class="titles">
        <h1>Torneo Biliardino - LAINATE</h1>
        <h2>KION PLAY-OFFS 2026</h2>
      </div>
    </header>

    <div class="controls" id="controls">
      <div class="card">
        <label for="numTeams">Numero squadre:</label>
        <input type="number" id="numTeams" min="2" value="8">
        <button id="btnGenerate" type="button">Genera Tabellone</button>
      </div>
    </div>

    <div class="bracket">
      <div class="girone" id="A">
        <svg class="lines"></svg>
      </div>

      <div class="center">
        <div class="trophy">🏆</div>
        <div class="final">
          <input id="finalA" placeholder="Finalista A" maxlength="15">
          <input id="finalB" placeholder="Finalista B" maxlength="15">
          <input id="finalScore" placeholder="Risultato finale (es. 10-8)">
          <input id="finalTime" placeholder="Tempo di gioco (es. 08:30)">
        </div>
      </div>

      <div class="girone reverse" id="B">
        <svg class="lines"></svg>
      </div>
    </div>
  </div>

<script>
/* ---------------- Helpers ---------------- */
function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}
function clampTeamName(v){ return (v || "").toString().slice(0,15); }

/* Stato gironi: serve per mapping corretto */
const bracketState = {
  A: { rounds: 0, reverse: false },
  B: { rounds: 0, reverse: true  }
};

/* ---------------- Match factory ---------------- */
function createMatch(gid, roundIndex, matchIndex){
  const match = document.createElement("div");
  match.className = "match";
  match.dataset.gid = gid;
  match.dataset.round = roundIndex;
  match.dataset.match = matchIndex;

  for(let teamSlot=0; teamSlot<2; teamSlot++){
    const row = document.createElement("div");
    row.className="team";

    const name = document.createElement("input");
    name.className="name";
    name.placeholder="Team name";
    name.maxLength = 15;

    const score = document.createElement("input");
    score.className="score";
    score.placeholder="0";
    score.inputMode = "numeric";
    score.maxLength = 2;
    score.addEventListener("input", () => {
      score.value = score.value.replace(/\D/g,'').slice(0,2);
    });

    // indicatore VITTORIA (toggle)
    const winDot = document.createElement("div");
    winDot.className = "dot win";
    winDot.title = "Vittoria";
    const sourceId = `${gid}-r${roundIndex}-m${matchIndex}-t${teamSlot}`;
    winDot.dataset.sourceId = sourceId;

    winDot.addEventListener("click", () => {
      winDot.classList.toggle("active");
      const isOn = winDot.classList.contains("active");
      const teamName = clampTeamName(name.value);

      if(isOn){
        // attivo: avanza
        advanceWinner(gid, roundIndex, matchIndex, teamSlot, teamName, sourceId);
      }else{
        // disattivo: se lo slot successivo era stato riempito da questo sourceId, lo svuota
        rollbackWinner(gid, roundIndex, matchIndex, teamSlot, sourceId);
      }
    });

    // ripescaggio (toggle) - indipendente
    const byeDot = document.createElement("div");
    byeDot.className = "dot bye";
    byeDot.title = "Ripescaggio";
    byeDot.addEventListener("click", () => byeDot.classList.toggle("active"));

    row.append(name, score, winDot, byeDot);
    match.appendChild(row);
  }

  const time = document.createElement("div");
  time.className="time";
  const tInput = document.createElement("input");
  tInput.placeholder = "Tempo di gioco (es. 08:30)";
  time.appendChild(tInput);
  match.appendChild(time);

  return match;
}

/* ---------------- Avanzamento/rollback (FIX semifinale->finale) ---------------- */
function getTargetSlot(roundIndex, matchIndex){
  // mapping standard: due match confluiscono in uno (m/2), slot in base a pari/dispari
  return {
    nextMatchIndex: Math.floor(matchIndex / 2),
    nextTeamSlot: (matchIndex % 2) // 0 = sopra, 1 = sotto
  };
}

function findRoundColumn(gid, roundIndex){
  const g = document.getElementById(gid);
  // le colonne round sono children NON svg
  return Array.from(g.children).find(el => el.classList && el.classList.contains("round") && +el.dataset.round === roundIndex);
}

function getFinalInputForGirone(gid){
  return document.getElementById(gid === "A" ? "finalA" : "finalB");
}

function advanceWinner(gid, roundIndex, matchIndex, teamSlot, teamName, sourceId){
  if(!teamName) return;

  const rounds = bracketState[gid].rounds;
  const isLastRound = (roundIndex === rounds - 1);

  // Se è ultimo round del girone, scrive nel finalista centrale
  if(isLastRound){
    const fin = getFinalInputForGirone(gid);
    fin.value = teamName;
    fin.dataset.from = sourceId;
    return;
  }

  // Altrimenti avanza al round successivo in modo deterministico (FIX bug semifinali)
  const { nextMatchIndex, nextTeamSlot } = getTargetSlot(roundIndex, matchIndex);

  const nextCol = findRoundColumn(gid, roundIndex + 1);
  if(!nextCol) return;

  const nextMatches = nextCol.querySelectorAll(".match");
  const targetMatch = nextMatches[nextMatchIndex];
  if(!targetMatch) return;

  const targetNameInputs = targetMatch.querySelectorAll("input.name");
  const targetInput = targetNameInputs[nextTeamSlot];
  if(!targetInput) return;

  // Sovrascrive se vuoto o se era stato messo dallo stesso source
  if(!targetInput.value || targetInput.dataset.from === sourceId){
    targetInput.value = teamName;
    targetInput.dataset.from = sourceId;
  }else{
    // se già occupato da altro, sovrascrivo comunque (più pratico in un tabellone live)
    targetInput.value = teamName;
    targetInput.dataset.from = sourceId;
  }
}

function rollbackWinner(gid, roundIndex, matchIndex, teamSlot, sourceId){
  const rounds = bracketState[gid].rounds;
  const isLastRound = (roundIndex === rounds - 1);

  if(isLastRound){
    const fin = getFinalInputForGirone(gid);
    if(fin.dataset.from === sourceId){
      fin.value = "";
      delete fin.dataset.from;
    }
    return;
  }

  const { nextMatchIndex, nextTeamSlot } = getTargetSlot(roundIndex, matchIndex);
  const nextCol = findRoundColumn(gid, roundIndex + 1);
  if(!nextCol) return;

  const nextMatches = nextCol.querySelectorAll(".match");
  const targetMatch = nextMatches[nextMatchIndex];
  if(!targetMatch) return;

  const targetNameInputs = targetMatch.querySelectorAll("input.name");
  const targetInput = targetNameInputs[nextTeamSlot];
  if(!targetInput) return;

  if(targetInput.dataset.from === sourceId){
    targetInput.value = "";
    delete targetInput.dataset.from;
  }
}

/* ---------------- Build girone ---------------- */
function buildGirone(gid, teams){
  const g = document.getElementById(gid);
  // lascia svg lines, rimuove il resto
  Array.from(g.children).forEach(ch => { if(!ch.classList.contains("lines")) ch.remove(); });

  const rounds = Math.ceil(Math.log2(Math.max(2, teams.length)));
  bracketState[gid].rounds = rounds;

  const slots = 2 ** rounds;
  while(teams.length < slots) teams.push("");

  for(let r=0; r<rounds; r++){
    const col = document.createElement("div");
    col.className = "round";
    col.dataset.round = r;

    const matchCount = 2 ** (rounds - r - 1);
    for(let m=0; m<matchCount; m++){
      col.appendChild(createMatch(gid, r, m));
    }
    g.appendChild(col);
  }

  // popola primo turno SOLO campi name
  const firstCol = findRoundColumn(gid, 0);
  const nameInputs = firstCol.querySelectorAll("input.name");
  teams.forEach((t,i)=>{ if(nameInputs[i]) nameInputs[i].value = clampTeamName(t); });

  drawLines(gid);
}

/* ---------------- SVG lines (robuste, non frammentate) ---------------- */
function drawLines(gid){
  const g = document.getElementById(gid);
  const svg = g.querySelector("svg.lines");
  if(!svg) return;

  // pulisci
  svg.innerHTML = "";

  const rounds = bracketState[gid].rounds;
  if(rounds <= 1) return;

  const gRect = g.getBoundingClientRect();

  function centerRight(el){
    const r = el.getBoundingClientRect();
    return { x: (r.right - gRect.left), y: (r.top - gRect.top + r.height/2) };
  }
  function centerLeft(el){
    const r = el.getBoundingClientRect();
    return { x: (r.left - gRect.left), y: (r.top - gRect.top + r.height/2) };
  }

  // per ogni round r -> r+1 collego match m -> floor(m/2)
  for(let r=0; r<rounds-1; r++){
    const col = findRoundColumn(gid, r);
    const nextCol = findRoundColumn(gid, r+1);
    if(!col || !nextCol) continue;

    const matches = col.querySelectorAll(".match");
    const nextMatches = nextCol.querySelectorAll(".match");

    matches.forEach((matchEl, mIdx) => {
      const targetIdx = Math.floor(mIdx/2);
      const targetEl = nextMatches[targetIdx];
      if(!targetEl) return;

      // direzione: girone A (sx->dx): start=right, end=left
      // girone B (reverse) (dx->sx): start=left, end=right
      const reverse = bracketState[gid].reverse;
      const start = reverse ? centerLeft(matchEl) : centerRight(matchEl);
      const end   = reverse ? centerRight(targetEl) : centerLeft(targetEl);

      // path a gomito: start -> midX -> end (verticale)
      const midX = reverse ? (start.x - 18) : (start.x + 18);

      const d = [
        `M ${start.x} ${start.y}`,
        `L ${midX} ${start.y}`,
        `L ${midX} ${end.y}`,
        `L ${end.x} ${end.y}`
      ].join(" ");

      const path = document.createElementNS("http://www.w3.org/2000/svg","path");
      path.setAttribute("d", d);
      path.setAttribute("fill","none");
      path.setAttribute("stroke","rgba(255,255,255,.85)");
      path.setAttribute("stroke-width","2");
      path.setAttribute("stroke-linecap","round");
      path.setAttribute("stroke-linejoin","round");
      svg.appendChild(path);
    });
  }
}

/* ---------------- Setup principale ---------------- */
function setup(){
  const numTeamsEl = document.getElementById("numTeams");
  const n = parseInt(numTeamsEl?.value || "0", 10);
  if(!n || n < 2) return;

  let teams = Array.from({length:n}, (_,i)=>`Squadra ${i+1}`);
  shuffle(teams);

  const mid = Math.ceil(teams.length/2);
  buildGirone("A", teams.slice(0, mid));
  buildGirone("B", teams.slice(mid));

  // Rimuovi controlli dopo build (così non rompe)
  const controls = document.getElementById("controls");
  if(controls) controls.remove();

  // ridisegna linee dopo un frame (layout stabilizzato)
  requestAnimationFrame(() => {
    drawLines("A");
    drawLines("B");
  });
}

/* Bind + resize */
document.getElementById("btnGenerate").addEventListener("click", setup);

window.addEventListener("resize", () => {
  // ridisegna sempre le linee su resize
  drawLines("A");
  drawLines("B");
});
</script>
</body>
</html>
