<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Torneo Biliardino - LAINATE</title>

<style>
:root{
  --primary:#6E0F4B;
  --accent1:#3189A1;
  --accent2:#00B446;
  --bye:#FF9800;
}

*{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}

body{
  margin:0;
  background:#6E0F4B url("kion-bg.png") center/cover no-repeat fixed;
  color:#fff;
}

header{
  text-align:center;
  padding:20px;
}

header img{
  height:80px;
  display:block;
  margin:0 auto 10px;
}

h1{margin:0;font-size:48px}
h2{margin:5px 0 0;font-size:24px;font-weight:normal}

.controls{
  text-align:center;
  margin:15px;
}

.controls input{
  padding:8px;
  font-size:16px;
}

.controls button{
  padding:8px 16px;
  font-size:16px;
  background:#fff;
  border:none;
  cursor:pointer;
}

.bracket{
  display:flex;
  justify-content:space-between;
  height:calc(100vh - 240px);
  padding:20px;
}

.girone{
  width:42%;
  display:flex;
}

.girone.reverse{
  flex-direction:row-reverse;
}

.round{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:space-around;
  position:relative;
}

.match{
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  padding:6px;
  position:relative;
}

.match:after{
  content:"";
  position:absolute;
  top:50%;
  right:-20px;
  width:20px;
  height:2px;
  background:#fff;
}

.reverse .match:after{
  left:-20px;
  right:auto;
}

.team{
  display:flex;
  align-items:center;
  margin:4px 0;
}

.team input.name{
  flex:1;
  padding:4px;
  max-width:150px;
  maxlength:15;
}

.team input.score{
  width:32px;
  margin-left:4px;
  text-align:center;
}

.team button{
  margin-left:4px;
  background:var(--accent2);
  border:none;
  color:#fff;
  cursor:pointer;
}

.bye{
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--bye);
  margin-left:6px;
  opacity:.3;
  cursor:pointer;
}

.bye.active{opacity:1;box-shadow:0 0 6px var(--bye)}

.time input{
  width:100%;
  margin-top:4px;
  padding:3px;
  font-size:12px;
}

.center{
  width:16%;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.trophy{font-size:80px}

.final input{
  width:90%;
  padding:6px;
  margin:5px auto;
}
</style>
</head>

<body>

<header>
  <img src="kion-logo.png" alt="KION">
  <h1>Torneo Biliardino - LAINATE</h1>
  <h2>KION PLAY-OFFS 2026</h2>
</header>

<div class="controls" id="controls">
  Numero squadre:
  <input type="number" id="numTeams" min="2" value="8">
  <button onclick="setup()">Crea Torneo</button>
</div>

<div class="bracket">
  <div class="girone" id="A"></div>

  <div class="center">
    <div class="trophy">🏆</div>
    <div class="final">
      <input placeholder="Finalista A" maxlength="15">
      <input placeholder="Finalista B" maxlength="15">
      <input placeholder="Risultato">
      <input placeholder="Tempo di gioco">
    </div>
  </div>

  <div class="girone reverse" id="B"></div>
</div>

<script>
function setup(){
  document.getElementById("controls").remove();

  let n = +numTeams.value;
  let teams = Array.from({length:n},(_,i)=>"Squadra "+(i+1));
  teams.sort(()=>Math.random()-0.5);

  let mid = Math.ceil(teams.length/2);
  build("A",teams.slice(0,mid));
  build("B",teams.slice(mid));
}

function build(id,teams){
  let g=document.getElementById(id);
  let r=Math.ceil(Math.log2(teams.length));
  let s=2**r;
  while(teams.length<s)teams.push("");

  for(let i=0;i<r;i++){
    let col=document.createElement("div");
    col.className="round";
    for(let m=0;m<2**(r-i-1);m++)col.appendChild(match());
    g.appendChild(col);
  }

  g.querySelectorAll(".name").forEach((i,x)=>i.value=teams[x]||"");
}

function match(){
  let m=document.createElement("div");
  m.className="match";
  for(let i=0;i<2;i++){
    let t=document.createElement("div");
    t.className="team";

    let n=document.createElement("input");
    n.className="name";
    n.maxLength=15;

    let s=document.createElement("input");
    s.className="score";
    s.maxLength=2;
    s.oninput=()=>s.value=s.value.replace(/\D/g,'');

    let b=document.createElement("button");
    b.textContent="✔";
    b.onclick=()=>advance(m,n.value);

    let bye=document.createElement("div");
    bye.className="bye";
    bye.onclick=()=>bye.classList.toggle("active");

    t.append(n,s,b,bye);
    m.appendChild(t);
  }
  let time=document.createElement("div");
  time.className="time";
  time.innerHTML='<input placeholder="Tempo di gioco">';
  m.appendChild(time);
  return m;
}

function advance(m,v){
  let n=m.parentElement.nextElementSibling;
  if(!n)return;
  let i=n.querySelector(".name");
  if(i&&!i.value)i.value=v;
}
</script>

</body>
</html>
