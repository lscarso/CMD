<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Torneo Biliardino - LAINATE</title>
  <style>
    :root{
      --brand:#6E0F4B;           /* ✅ richiesto: colore evidenziazione + background */
      --kion-red:#8a1538;
      --kion-red-2:#b11f47;

      --card: rgba(255,255,255,.94);
      --card2: rgba(255,255,255,.90);
      --line: rgba(10, 14, 26, .10);

      --text:#121622;
      --muted:#5b6475;

      --shadow: 0 10px 28px rgba(0,0,0,.18);
      --radius: 16px;

      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;

      /* TV-friendly, compatto */
      --fs-10: clamp(10px, 0.55vw, 12px);
      --fs-11: clamp(11px, 0.62vw, 13px);
      --fs-12: clamp(12px, 0.70vw, 14px);
      --fs-13: clamp(13px, 0.78vw, 16px);
      --fs-15: clamp(15px, 0.95vw, 20px);
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; } /* ✅ niente scroll */
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background: var(--brand); /* ✅ richiesto */
    }

    /* Sfondo con immagine leggermente visibile */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background-image: url("kion-bg.png");
      background-size: cover;
      background-position: center;
      background-repeat:no-repeat;
      opacity:.16;
      filter: saturate(1.05) contrast(1);
      z-index:-1;
      transform: scale(1.02);
    }

    header{
      position:sticky;
      top:0;
      z-index:5;
      padding:10px 14px;
      display:grid;
      grid-template-columns: 1fr auto;
      align-items:center;
      gap:12px;
      background: rgba(0,0,0,.10);
      border-bottom: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(8px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width: 280px;
      color:#fff;
    }
    .brand img{
      width: clamp(42px, 3vw, 62px);
      height: clamp(42px, 3vw, 62px);
      object-fit:contain;
      border-radius: 12px;
      background: rgba(255,255,255,.86);
      padding:6px;
      border: 1px solid rgba(255,255,255,.55);
      box-shadow: 0 8px 18px rgba(0,0,0,.18);
    }
    .titleWrap{ line-height:1.05; }
    .titleWrap .t1{
      font-weight: 900;
      font-size: var(--fs-15);
      letter-spacing: .2px;
      white-space:nowrap;
    }
    .titleWrap .t2{
      font-size: var(--fs-11);
      color: rgba(255,255,255,.78);
      white-space:nowrap;
      margin-top:3px;
    }

    .toolbar{
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:flex-end;
      flex-wrap:wrap;
    }
    .btn{
      border:0;
      border-radius: 14px;
      padding:10px 12px;
      cursor:pointer;
      font-weight:900;
      color:#fff;
      background: linear-gradient(180deg, var(--kion-red-2), var(--kion-red));
      box-shadow: 0 10px 22px rgba(0,0,0,.18);
      transition: transform .05s ease;
      font-size: var(--fs-12);
    }
    .btn:active{ transform: translateY(1px); }
    .btn.secondary{
      background: rgba(255,255,255,.14);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:none;
      color: rgba(255,255,255,.92);
    }
    .btn.ghost{
      background: transparent;
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.92);
      box-shadow:none;
    }

    /* Layout senza scroll */
    .wrap{
      height: calc(100vh - 86px);
      display:grid;
      grid-template-columns: 2.15fr 1fr;
      gap: 12px;
      padding: 12px;
      max-width: min(2200px, 99vw);
      margin: 0 auto;
      overflow:hidden;
    }

    .panel{
      background: var(--card);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .panelHead{
      padding:10px 12px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.90));
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:10px;
      flex: 0 0 auto;
    }
    .panelHead h2{
      margin:0;
      font-size: var(--fs-12);
      font-weight: 900;
      letter-spacing:.2px;
    }
    .panelHead .sub{
      font-size: var(--fs-10);
      color: var(--muted);
      margin-top:3px;
    }

    /* Gironi: 2x5 -> sempre visibile */
    .groupsGrid{
      flex: 1 1 auto;
      min-height:0;
      padding: 10px;
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 10px;
      overflow:hidden;
    }

    .groupCard{
      background: var(--card2);
      border: 1px solid rgba(10,14,26,.10);
      border-radius: 14px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .groupHeader{
      padding:7px 9px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid rgba(10,14,26,.10);
      background: rgba(255,255,255,.62);
      flex: 0 0 auto;
    }
    .groupHeader .gname{
      font-weight: 900;
      letter-spacing:.25px;
      font-size: var(--fs-11);
    }
    .badge{
      font-size: var(--fs-10);
      padding:5px 9px;
      border-radius: 999px;
      color:#fff;
      background: linear-gradient(180deg, var(--kion-red-2), var(--kion-red));
      white-space:nowrap;
    }

    table{ width:100%; border-collapse:collapse; }
    th, td{
      padding: 5px 6px;
      border-bottom: 1px solid rgba(10,14,26,.08);
      font-size: var(--fs-10);
      vertical-align:middle;
      line-height:1.05;
    }
    th{
      text-align:left;
      font-size: var(--fs-10);
      letter-spacing:.22px;
      text-transform:uppercase;
      color: var(--muted);
      background: rgba(255,255,255,.62);
    }
    td.num, th.num{
      text-align:right;
      font-variant-numeric: tabular-nums;
      font-family: var(--mono);
    }
    .nowrap{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Matches super-compact */
    .matches{
      padding: 6px 9px 7px;
      flex: 1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .matchRow{
      display:grid;
      grid-template-columns: 1fr 40px 12px 40px 1fr;
      align-items:center;
      gap:6px;
    }
    .teamLbl{
      font-weight: 900;
      font-size: var(--fs-10);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .teamLbl.right{ text-align:right; }
    .scoreInput{
      width:40px;
      padding:6px 6px;
      border-radius: 10px;
      border: 1px solid rgba(10,14,26,.18);
      background:#fff;
      font-family: var(--mono);
      font-weight:900;
      text-align:center;
      font-size: var(--fs-10);
      outline:none;
    }
    .scoreInput.invalid{
      border-color: rgba(177,31,71,.75);
      box-shadow: 0 0 0 3px rgba(177,31,71,.12);
    }
    .vs{
      text-align:center;
      color: var(--muted);
      font-size: var(--fs-10);
      font-family: var(--mono);
    }

    /* RIGHT: lista senza scroll, 2 colonne x 15 righe */
    .rightBody{
      flex: 1 1 auto;
      min-height:0;
      padding: 10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      overflow:hidden;
    }

    /* Header compatto: 2 colonne (Nome + stats compatti) */
    .teamsHeader{
      display:grid;
      grid-template-columns: 1.35fr 1fr;
      gap:6px;
      font-size: var(--fs-10);
      color: var(--muted);
      text-transform:uppercase;
      letter-spacing:.22px;
      padding: 6px 8px;
      border: 1px solid rgba(10,14,26,.10);
      border-radius: 12px;
      background: rgba(255,255,255,.62);
      flex: 0 0 auto;
    }

    .teamsGrid{
      flex: 1 1 auto;
      min-height:0;
      display:grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(15, 1fr);
      gap: 6px;
      overflow:hidden;
    }

    .teamRow{
      border: 1px solid rgba(10,14,26,.10);
      border-radius: 12px;
      background: rgba(255,255,255,.92);
      padding: 6px 8px;
      display:grid;
      grid-template-columns: 1.35fr 1fr;
      gap:6px;
      align-items:center;
      min-height: 0;
    }

    /* ✅ Evidenziazione 1° classificato SOLO con colore #6E0F4B */
    .teamRow.winner{
      background: var(--brand);
      border-color: rgba(255,255,255,.35);
      box-shadow: 0 10px 18px rgba(0,0,0,.12);
    }

    /* Nome squadra: textarea per mostrare nomi lunghi (no scroll) */
    .nameEdit{
      width: 100%;
      height: 2.2em;            /* ~2 righe visibili */
      line-height: 1.05;
      padding:6px 8px;
      border-radius: 10px;
      border: 1px solid rgba(10,14,26,.14);
      outline:none;
      background: rgba(255,255,255,.96);
      font-size: var(--fs-10);
      font-weight: 900;
      resize: none;
      overflow: hidden;         /* ✅ niente scrollbar nel campo */
      white-space: pre-wrap;
    }

    .teamRow.winner .nameEdit{
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.22);
      color: #fff;
    }

    /* Colonna stats compatta */
    .statsCompact{
      text-align:right;
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
      font-size: var(--fs-10);
      font-weight: 900;
      color: rgba(10,14,26,.82);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .teamRow.winner .statsCompact{
      color:#fff;
    }

    /* Fallback se schermo stretto */
    @media (max-width: 1200px){
      .wrap{ grid-template-columns: 1fr; height: calc(100vh - 110px); }
      .groupsGrid{ grid-template-columns: repeat(2, 1fr); grid-template-rows: auto; }
      .teamsGrid{ grid-template-columns: 1fr; grid-template-rows: repeat(30, 1fr); }
    }
  </style>
</head>

<body>
  <header>
    <div class="brand">
      <img src="kion-logo.png" alt="KION" />
      <div class="titleWrap">
        <div class="t1">Torneo Biliardino - LAINATE</div>
        <div class="t2">Punteggio: 2 vittoria / 0 sconfitta + differenza reti</div>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn" id="shuffleBtn">Rimescola gironi</button>
      <button class="btn secondary" id="resetScoresBtn">Reset risultati</button>
      <button class="btn ghost" id="resetAllBtn" title="Ripristina nomi, gironi e risultati">Reset tutto</button>
    </div>
  </header>

  <div class="wrap">
    <!-- LEFT -->
    <section class="panel">
      <div class="panelHead">
        <div>
          <h2>Gironi &amp; Classifiche</h2>
          <div class="sub">10 gironi (A–J) • 3 squadre • 3 partite per girone • Nessuno scroll</div>
        </div>
        <div class="badge" id="configLabel">—</div>
      </div>
      <div class="groupsGrid" id="groupsGrid"></div>
    </section>

    <!-- RIGHT -->
    <aside class="panel">
      <div class="panelHead">
        <div>
          <h2>Elenco squadre &amp; Punteggio</h2>
          <div class="sub">Il 1° di ogni girone è evidenziato in <b>#6E0F4B</b>.</div>
        </div>
        <div class="badge" id="teamsCountBadge">30</div>
      </div>

      <div class="rightBody">
        <div class="teamsHeader">
          <div>Squadra</div>
          <div style="text-align:right;">GRP • DR • PTS • SCORE</div>
        </div>

        <div class="teamsGrid" id="teamsGrid"></div>
      </div>
    </aside>
  </div>

<script>
(() => {
  const STORAGE_KEY = "TORNEO_BILIARDINO_LAINATE_V4";

  const GROUPS = 10;
  const TOTAL_TEAMS = 30;
  const TEAMS_PER_GROUP = 3;

  const WIN_POINTS = 2;
  const LOSS_POINTS = 0;

  const groupNames = Array.from({length: GROUPS}, (_,i)=> String.fromCharCode(65+i)); // A-J
  let state = null;

  const defaultState = () => {
    const teams = Array.from({length: TOTAL_TEAMS}, (_,i)=>({
      id: (crypto.randomUUID ? crypto.randomUUID() : ("t"+Math.random().toString(16).slice(2))),
      name: `Squadra ${i+1}`,
      group: null
    }));

    const groups = Object.fromEntries(groupNames.map(g => [g, []]));
    assignRandomGroups(teams, groups);

    const matches = {};
    groupNames.forEach(g => {
      matches[g] = buildRoundRobin(groups[g]).map(([a,b]) => ({
        id: "m_"+Math.random().toString(16).slice(2),
        a, b,
        ga: "", gb: ""
      }));
    });

    return { teams, groups, matches };
  };

  function assignRandomGroups(teams, groups){
    const shuffled = [...teams].sort(()=> Math.random() - 0.5);
    let idx = 0;
    groupNames.forEach(g => groups[g] = []);
    groupNames.forEach(g => {
      for(let k=0; k<TEAMS_PER_GROUP; k++){
        const t = shuffled[idx++];
        if(!t) break;
        t.group = g;
        groups[g].push(t.id);
      }
    });
  }

  function buildRoundRobin(teamIds){
    const pairs = [];
    for(let i=0;i<teamIds.length;i++){
      for(let j=i+1;j<teamIds.length;j++){
        pairs.push([teamIds[i], teamIds[j]]);
      }
    }
    return pairs; // 3 squadre => 3 match
  }

  function save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
  }
  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      const parsed = JSON.parse(raw);
      if(!parsed || !parsed.teams || !parsed.groups || !parsed.matches) return null;
      return parsed;
    }catch(e){ return null; }
  }

  function teamName(id){
    const t = state.teams.find(x => x.id === id);
    return t ? t.name : "?";
  }

  function computeGroupStats(groupName){
    const teamIds = state.groups[groupName];
    const byId = Object.fromEntries(state.teams.map(t => [t.id, t]));

    const stats = {};
    teamIds.forEach(id => {
      stats[id] = { id, name: byId[id]?.name ?? "?", V:0, S:0, GF:0, GS:0, DR:0, Punti:0, Punteggio:0 };
    });

    (state.matches[groupName] || []).forEach(m => {
      const ga = parseInt(m.ga,10);
      const gb = parseInt(m.gb,10);

      const A = stats[m.a];
      const B = stats[m.b];
      if(!A || !B) return;

      const valid = Number.isFinite(ga) && Number.isFinite(gb) && ga >= 0 && gb >= 0;
      if(!valid) return;

      A.GF += ga; A.GS += gb;
      B.GF += gb; B.GS += ga;

      if(ga > gb){
        A.V += 1; B.S += 1;
        A.Punti += WIN_POINTS;
        B.Punti += LOSS_POINTS;
      } else if(gb > ga){
        B.V += 1; A.S += 1;
        B.Punti += WIN_POINTS;
        A.Punti += LOSS_POINTS;
      } else {
        // pareggio: 0 punti
      }
    });

    teamIds.forEach(id => {
      stats[id].DR = stats[id].GF - stats[id].GS;
      stats[id].Punteggio = stats[id].Punti + stats[id].DR;
    });

    const standings = Object.values(stats).sort((x,y) =>
      (y.Punteggio - x.Punteggio) ||
      (y.Punti - x.Punti) ||
      (y.DR - x.DR) ||
      (y.GF - x.GF) ||
      (x.name.localeCompare(y.name))
    );

    return { stats, standings };
  }

  function computeAllTeams(){
    const all = {};
    state.teams.forEach(t => {
      all[t.id] = { id:t.id, name:t.name, group:t.group, GF:0, GS:0, DR:0, Punti:0, Punteggio:0 };
    });

    groupNames.forEach(g => {
      (state.matches[g] || []).forEach(m => {
        const ga = parseInt(m.ga,10);
        const gb = parseInt(m.gb,10);
        const A = all[m.a];
        const B = all[m.b];
        if(!A || !B) return;

        const valid = Number.isFinite(ga) && Number.isFinite(gb) && ga >= 0 && gb >= 0;
        if(!valid) return;

        A.GF += ga; A.GS += gb;
        B.GF += gb; B.GS += ga;

        if(ga > gb){
          A.Punti += WIN_POINTS;
          B.Punti += LOSS_POINTS;
        } else if(gb > ga){
          B.Punti += WIN_POINTS;
          A.Punti += LOSS_POINTS;
        }
      });
    });

    Object.values(all).forEach(s => {
      s.DR = s.GF - s.GS;
      s.Punteggio = s.Punti + s.DR;
    });

    const sorted = Object.values(all).sort((x,y) =>
      (y.Punteggio - x.Punteggio) ||
      (y.Punti - x.Punti) ||
      (y.DR - x.DR) ||
      (y.GF - x.GF) ||
      (x.name.localeCompare(y.name))
    );

    return { sorted, all };
  }

  function getWinnersSet(){
    const winners = new Set();
    groupNames.forEach(g => {
      const { standings } = computeGroupStats(g);
      if(standings[0]?.id) winners.add(standings[0].id);
    });
    return winners;
  }

  // RENDER
  const groupsGrid = document.getElementById("groupsGrid");
  const teamsGrid  = document.getElementById("teamsGrid");
  const teamsCountBadge = document.getElementById("teamsCountBadge");
  const configLabel = document.getElementById("configLabel");

  function render(){
    teamsCountBadge.textContent = `${state.teams.length}`;
    configLabel.textContent = `${GROUPS} gironi • ${TEAMS_PER_GROUP}/girone`;
    renderGroups();
    renderTeamsList();
  }

  function renderGroups(){
    groupsGrid.innerHTML = "";
    groupNames.forEach(g => {
      const { standings } = computeGroupStats(g);

      const card = document.createElement("div");
      card.className = "groupCard";

      const head = document.createElement("div");
      head.className = "groupHeader";
      head.innerHTML = `<div class="gname">Girone ${g}</div><div class="badge">3 squadre</div>`;
      card.appendChild(head);

      const table = document.createElement("table");
      table.innerHTML = `
        <thead>
          <tr>
            <th>Squadra</th>
            <th class="num">DR</th>
            <th class="num">PTS</th>
            <th class="num">SCORE</th>
          </tr>
        </thead>
        <tbody>
          ${standings.map((s,idx)=>`
            <tr>
              <td class="nowrap" title="${esc(s.name)}">${idx===0 ? "🏆 " : ""}${esc(s.name)}</td>
              <td class="num">${s.DR}</td>
              <td class="num">${s.Punti}</td>
              <td class="num" style="color:var(--kion-red);font-weight:900;">${s.Punteggio}</td>
            </tr>
          `).join("")}
        </tbody>
      `;
      card.appendChild(table);

      const matchesBox = document.createElement("div");
      matchesBox.className = "matches";

      (state.matches[g] || []).forEach(m => {
        const row = document.createElement("div");
        row.className = "matchRow";
        const aName = teamName(m.a);
        const bName = teamName(m.b);

        row.innerHTML = `
          <div class="teamLbl right" title="${esc(aName)}">${esc(aName)}</div>
          <input class="scoreInput" inputmode="numeric" pattern="[0-9]*" placeholder="-" value="${m.ga}" data-g="${g}" data-mid="${m.id}" data-side="a">
          <div class="vs">:</div>
          <input class="scoreInput" inputmode="numeric" pattern="[0-9]*" placeholder="-" value="${m.gb}" data-g="${g}" data-mid="${m.id}" data-side="b">
          <div class="teamLbl" title="${esc(bName)}">${esc(bName)}</div>
        `;

        const aIn = row.querySelector('input[data-side="a"]');
        const bIn = row.querySelector('input[data-side="b"]');
        applyInvalidStyle(aIn, bIn);

        aIn.addEventListener("input", onScoreInput);
        bIn.addEventListener("input", onScoreInput);

        matchesBox.appendChild(row);
      });

      card.appendChild(matchesBox);
      groupsGrid.appendChild(card);
    });
  }

  function renderTeamsList(){
    const { sorted } = computeAllTeams();
    const winners = getWinnersSet();

    teamsGrid.innerHTML = "";
    sorted.forEach(s => {
      const row = document.createElement("div");
      row.className = "teamRow" + (winners.has(s.id) ? " winner" : "");

      // ✅ Compatto: GRP • DR • PTS • SCORE
      const stats = `${s.group ?? "-"} • DR ${fmt(s.DR)} • PTS ${s.Punti} • SCORE ${fmt(s.Punteggio)}`;

      row.innerHTML = `
        <div>
          <textarea class="nameEdit" data-tid="${s.id}" title="${escAttr(s.name)}">${esc(s.name)}</textarea>
        </div>
        <div class="statsCompact" title="${escAttr(stats)}">${esc(stats)}</div>
      `;

      const area = row.querySelector(".nameEdit");

      // Auto-fit: mantiene altezza fissa ma evita scrollbar interne
      area.addEventListener("input", (e) => {
        const id = e.target.getAttribute("data-tid");
        const t = state.teams.find(x => x.id === id);
        if(!t) return;

        // Nessun limite caratteri: salva tutto
        t.name = e.target.value;

        save();
        renderGroups();
        renderTeamsList();
      });

      teamsGrid.appendChild(row);
    });
  }

  function onScoreInput(e){
    const inp = e.target;
    inp.value = inp.value.replace(/[^\d]/g,"").slice(0,2);

    const g = inp.getAttribute("data-g");
    const mid = inp.getAttribute("data-mid");
    const side = inp.getAttribute("data-side");

    const match = (state.matches[g] || []).find(x => x.id === mid);
    if(!match) return;

    if(side === "a") match.ga = inp.value;
    else match.gb = inp.value;

    const row = inp.closest(".matchRow");
    const aIn = row.querySelector('input[data-side="a"]');
    const bIn = row.querySelector('input[data-side="b"]');
    applyInvalidStyle(aIn, bIn);

    save();
    render();
  }

  function applyInvalidStyle(aIn, bIn){
    const ga = parseInt(aIn.value,10);
    const gb = parseInt(bIn.value,10);

    const validA = aIn.value === "" || (Number.isFinite(ga) && ga >= 0);
    const validB = bIn.value === "" || (Number.isFinite(gb) && gb >= 0);

    aIn.classList.toggle("invalid", !validA);
    bIn.classList.toggle("invalid", !validB);

    const both = aIn.value !== "" && bIn.value !== "";
    const draw = both && Number.isFinite(ga) && Number.isFinite(gb) && ga === gb;
    if(draw){ aIn.classList.add("invalid"); bIn.classList.add("invalid"); }
  }

  // BUTTONS
  document.getElementById("shuffleBtn").addEventListener("click", () => {
    const groups = Object.fromEntries(groupNames.map(g => [g, []]));
    assignRandomGroups(state.teams, groups);
    state.groups = groups;

    const matches = {};
    groupNames.forEach(g => {
      matches[g] = buildRoundRobin(groups[g]).map(([a,b]) => ({
        id: "m_"+Math.random().toString(16).slice(2),
        a, b, ga:"", gb:""
      }));
    });
    state.matches = matches;

    save();
    render();
  });

  document.getElementById("resetScoresBtn").addEventListener("click", () => {
    groupNames.forEach(g => (state.matches[g] || []).forEach(m => { m.ga=""; m.gb=""; }));
    save();
    render();
  });

  document.getElementById("resetAllBtn").addEventListener("click", () => {
    try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
    state = defaultState();
    save();
    render();
  });

  function fmt(n){
    if (typeof n !== "number") return n;
    return (n > 0 ? "+"+n : ""+n);
  }

  function esc(str){
    return (str ?? "").toString()
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }
  function escAttr(str){ return esc(str).replaceAll("\n"," "); }

  state = load() || defaultState();
  save();
  render();
})();
</script>
</body>
</html>
